<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Repertoire | Acordes & Tabs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="three-bg"></div>
    <div id="app">
        <aside>
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-music"></i>
                </div>
                <h2>Musica</h2>
            </div>
            
            <nav>
                <div style="margin-top: 2rem; margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 1px;">
                    Carpetas
                </div>
                <ul class="folder-list" id="folder-list">
                    <li class="folder-item active" data-folder="all">
                        <i class="fas fa-th-large"></i>
                        Todas
                    </li>
                    <!-- dynamic folders here -->
                </ul>
            </nav>
        </aside>

        <main>
            <header>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search" placeholder="Busca por canción, artista o sitio...">
                </div>
                <div class="actions" style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" id="refresh-btn" style="background: var(--glass); color: white;">
                        <i class="fas fa-sync-alt"></i>
                        Sincronizar
                    </button>
                    <button class="btn btn-primary" id="random-btn">
                        <i class="fas fa-shuffle"></i>
                        ¿Qué cantar?
                    </button>
                </div>
            </header>

            <div id="stats" style="margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Mostrando <span id="song-count" style="color: var(--text-main); font-weight: 600;">0</span> canciones
            </div>

            <div class="song-grid" id="song-grid">
                <!-- dynamic songs here -->
            </div>
        </main>
    </div>

    <!-- Modal for song selection (Random) -->
    <div id="random-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; place-items: center;">
        <div class="song-card" id="random-card" style="width: 400px; padding: 3rem; text-align: center;">
            <div style="font-size: 0.9rem; color: var(--primary); margin-bottom: 1rem; font-weight: 700; text-transform: uppercase;">¡Hoy deberías cantar!</div>
            <div class="song-title" id="rand-title" style="font-size: 2rem; margin-bottom: 1.5rem;">Cargando...</div>
            <div style="display: flex; gap: 1rem; flex-direction: column;">
                <button id="rand-view-internal" class="btn btn-primary" style="justify-content: center; width: 100%;">
                    <i class="fas fa-eye"></i> Ver en mi página
                </button>
                <a href="#" id="rand-link" target="_blank" class="btn" style="justify-content: center; background: var(--glass); color: white; width: 100%;">
                    <i class="fas fa-external-link-alt"></i> Ir a la fuente
                </a>
            </div>
            <button onclick="document.getElementById('random-modal').style.display='none'" style="margin-top: 1.5rem; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem;">Tal vez luego</button>
        </div>
    </div>

    <div id="song-viewer" style="display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; overflow-y: auto;">
        <div style="max-width: 900px; margin: 0 auto; padding: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; position: sticky; top: 0; background: var(--bg-dark); padding: 1rem 0; border-bottom: 1px solid var(--glass-border); z-index: 10;">
                <h2 id="viewer-title">Canción</h2>
                <button onclick="closeSongViewer()" class="btn" style="background:var(--glass); color:white;">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
            
            <div id="diagrams-container" class="diagrams-scroll">
                <!-- SVGs will be placed here -->
            </div>
            
            <div id="viewer-content"></div>
        </div>
        
        <!-- Autoscroll Panel -->
        <div id="autoscroll-controls" class="autoscroll-panel" style="display: none;">
            <button id="scroll-decrease" class="btn-icon"><i class="fas fa-minus"></i></button>
            <button id="scroll-toggle" class="btn-primary" style="border-radius: 20px; padding: 0.5rem 1rem;">
                <i class="fas fa-play"></i> Auto-Scroll
            </button>
            <button id="scroll-increase" class="btn-icon"><i class="fas fa-plus"></i></button>
            <div id="scroll-speed-display">x1</div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
